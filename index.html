<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a"/>    
    <link href='https://i.ibb.co/b52pjVWp/IMG-20260403-210738-880.webp' rel='icon' type='image/x-icon'/>    
    <link href='https://i.ibb.co/b52pjVWp/IMG-20260403-210738-880.webp' rel='shortcut icon' type='image/x-icon'/>    
   
    <title>Gauranga</title>
    <style>
        img {
  filter: grayscale(100%);
/* Disable selection and save menus */
            -webkit-touch-callout: none; /* Disables iOS Safari long-press menu */
            -webkit-user-select: none;   /* Safari */
            -khtml-user-select: none;     /* Konqueror HTML */
            -moz-user-select: none;        /* Firefox */
            -ms-user-select: none;         /* Internet Explorer/Edge */
            user-select: none;             /* Chrome, Opera, and Edge */
            pointer-events: none;          /* Makes the image un-clickable/un-draggable */
        }
        
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Header / Blog Title Section */
        .blog-header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 50px auto;
        }

        .blog-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff7b00, #ffae00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .blog-header p {
            color: #a0a0a0;
            font-size: 1rem;
        }

        /* Container & Grid Styling */
        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
        }

        /* Individual Blog Post Card */
        .blog-card {
            background-color: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid #2a2a2a;
        }

        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            border-color: #444;
        }

        /* Image Wrapper */
        .card-image-box {
            width: 100%;
            height: 240px;
            overflow: hidden;
            background-color: #000;
            cursor: pointer; /* Changed to pointer to show it's clickable */
        }

        .card-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transition: transform 0.5s ease;
        }

        .blog-card:hover .card-image-box img {
            transform: scale(1.05);
        }

        /* Text/Content Details Area */
        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.4;
            color: #f3f4f6;
            word-wrap: break-word;
        }

        .card-date {
            font-size: 13px;
            color: #888888;
            margin-top: auto; 
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Center Loader Messaging */
        .loading {
            text-align: center;
            font-size: 18px;
            color: #a0a0a0;
            padding: 50px 0;
            width: 100%;
        }

        /* Fullscreen Lightbox Styles */
        .lightbox-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox-modal.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }

        .lightbox-close:hover {
            color: #ffaa00;
        }

        /* Responsive Breakpoints */
        @media (max-width: 480px) {
            body {
                padding: 20px 15px;
            }
            .blog-header h1 {
                font-size: 2rem;
            }
            .blog-grid {
                gap: 20px;
            }
            .lightbox-close {
                top: 15px;
                right: 20px;
                font-size: 35px;
            }
        }
    </style>
</head>
<body>

    <header class="blog-header">
        <h1>Gauranga Photography</h1>
        <p>A visual journal of captured moments.</p>
    </header>

    <main class="gallery-container">
        <div class="loading" id="loadingText">Gathering stories...</div>
        <div class="blog-grid" id="blogGrid"></div>
    </main>

    <div id="lightbox" class="lightbox-modal">
        <span class="lightbox-close" id="lightboxClose">&times;</span>
        <img class="lightbox-content" id="lightboxImg" src="" alt="Fullscreen View">
    </div>

    <script>
        const FOLDER_ID = '17xpGPnuLvMUmYQR2ONfdPGruYTKbCCe5'; 
        const API_KEY = 'AIzaSyD-7ifcYbg0I4v7l44yo-KfSO7SUNU8W28'; 

        const blogGrid = document.getElementById('blogGrid');
        const loadingText = document.getElementById('loadingText');
        
        // Lightbox Elements
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxClose = document.getElementById('lightboxClose');

        function formatDate(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        async function fetchDriveImages() {
            const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'image/'&fields=files(id,name,createdTime)&key=${API_KEY}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                if (data.files && data.files.length > 0) {
                    loadingText.style.display = 'none';
                    
                    data.files.forEach((file) => {
                        // Using your link setup. (Note: standard high-res drive url is usually 'https://lh3.googleusercontent.com/d/{id}=w1600' if profile snippet fails)
                        const imageUrl = `https://lh3.googleusercontent.com/d/${file.id}=w1000`;
                        const cleanDate = formatDate(file.createdTime);
                        const cleanTitle = file.name.replace(/\.[^/.]+$/, "");

                        const cardDiv = document.createElement('article');
                        cardDiv.classList.add('blog-card');
                        
                        cardDiv.innerHTML = `
                            <div class="card-image-box">
                                <img src="${imageUrl}" alt="${file.name}" loading="lazy" onerror="this.src='https://placehold.co/600x400/1e1e1e/a0a0a0?text=Image+Access+Error'">
                            </div>
                            <div class="card-content">
                                <h2 class="card-title">${cleanTitle}</h2>
                                <div class="card-date">
                                    <span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-calendar3" viewBox="0 0 16 16">
  <path d="M14 0H2a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2M1 3.857C1 3.384 1.448 3 2 3h12c.552 0 1 .384 1 .857v10.286c0 .473-.448.857-1 .857H2c-.552 0-1-.384-1-.857z"/>
  <path d="M6.5 7a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m-9 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m-9 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2"/>
</svg></span> Published: ${cleanDate}
                                </div>
                            </div>
                        `;

                        // Lightbox click event added directly to the image container
                        const imageBox = cardDiv.querySelector('.card-image-box');
                        imageBox.addEventListener('click', () => {
                            const targetImg = imageBox.querySelector('img');
                            // Fallback to avoid trying to open the placeholder image if it errored out
                            if(!targetImg.src.includes('placehold.co')) {
                                openLightbox(targetImg.src);
                            }
                        });

                        blogGrid.appendChild(cardDiv);
                    });
                } else {
                    loadingText.innerText = "Folder mein koi images nahi mili!";
                }
            } catch (error) {
                console.error("Error fetching images:", error);
                loadingText.innerText = "Error: " + error.message;
            }
        }

        // Functions to control Lightbox
        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevents scrolling behind the image
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = ''; // Restores scrolling
            setTimeout(() => { lightboxImg.src = ''; }, 300); // Clear source after transition completes
        }

        // Close events
        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => {
            // Closes only if you click the dark background, not the image itself
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // Close on 'Escape' key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                closeLightbox();
            }
        });

        fetchDriveImages();
    </script>
</body>
</html>
